<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caloria</title>
  <meta http-equiv="refresh" content="2; url=index.html" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 8% 8%, rgba(13, 148, 136, 0.12), transparent 38%),
        radial-gradient(circle at 92% 12%, rgba(109, 93, 246, 0.12), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(255, 107, 87, 0.08), transparent 45%),
        #EAEFF6;
      font-family: 'Inter', 'Poppins', Arial, sans-serif;
    }

    .redirect-card {
      width: min(400px, 92vw);
      padding: 32px 26px;
      border-radius: 32px;
      background: #ffffff;
      border: 1px solid rgba(99, 115, 129, 0.1);
      box-shadow: 0 24px 56px rgba(11, 60, 84, 0.14);
      text-align: center;
    }

    .hero-illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 22px;
      border-radius: 30px;
      background: radial-gradient(circle at 30% 28%, rgba(109, 93, 246, 0.35), transparent 42%),
                  radial-gradient(circle at 75% 72%, rgba(255, 107, 87, 0.30), transparent 40%),
                  linear-gradient(165deg, #e9f7f4 0%, #f3f0ff 100%);
      position: relative;
      overflow: hidden;
    }

    .hero-illustration::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 18px;
      background: rgba(13, 148, 136, 0.30);
      top: 14px;
      left: 18px;
    }

    .hero-illustration::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #FF6B57;
      bottom: 18px;
      right: 18px;
      box-shadow: 0 10px 20px rgba(255, 107, 87, 0.28);
    }

    .redirect-title {
      font-size: 26px;
      font-weight: 700;
      font-family: 'Sora', 'Poppins', sans-serif;
      color: #101B2D;
      margin-bottom: 12px;
    }

    .redirect-text {
      color: #5C7184;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .redirect-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0D9488 0%, #6D5DF6 140%);
      color: white;
      text-decoration: none;
      font-weight: 700;
      border: none;
      box-shadow: 0 14px 26px rgba(13, 148, 136, 0.28);
    }
  </style>
</head>
<body>
  <div class="redirect-card">
    <div class="hero-illustration"></div>
    <div class="redirect-title">Selamat datang di Caloria</div>
    <div class="redirect-text">Kami sedang mengalihkan Anda ke kalkulator BMI. Jika tidak otomatis, tekan tombol di bawah.</div>
    <a class="redirect-link" href="index.html">Lanjutkan ke BMI</a>
  </div>
</body>
</html>
