<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caloria Daftar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="phone-container">
    <div class="notch"></div>
    <div id="signup-screen" class="screen active">
        <div class="login-header card-header">
            <div>
                <h1>Daftar Caloria</h1>
                <p class="page-subtitle">Buat akun baru untuk mulai melacak nutrisi Anda.</p>
            </div>
            <div class="ai-badge">
                <div class="ai-badge-dot"></div>
                <span>AI</span>
            </div>
        </div>
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="signup-name" placeholder="Nama lengkap" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="email@example.com" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-password" placeholder="••••••" />
        </div>
        <button class="btn-primary" onclick="handleSignup()">Daftar</button>
        <div class="auth-footer">
            <span>Sudah punya akun?</span>
            <button class="auth-link" onclick="window.location.href='login.html'">Masuk</button>
        </div>
    </div>
</div>
<script>
    window.addEventListener('load', function () {
        const sessionActive = localStorage.getItem('sessionActive');
        const storedEmail = localStorage.getItem('userEmail');
        const storedBMI = localStorage.getItem('userBMI');

        if (sessionActive === '1' && storedEmail && storedBMI) {
            window.location.href = 'app.html';
        }
    });

    function handleSignup() {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value.trim();

        if (name === '' || email === '' || password === '') {
            alert('Silakan lengkapi semua kolom untuk mendaftar.');
            return;
        }

        localStorage.setItem('userName', name);
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userPassword', password);
        // mark session active so the user can proceed to BMI
        localStorage.setItem('sessionActive', '1');

        if (!localStorage.getItem('userBMI')) {
            window.location.href = 'index.html';
        } else {
            window.location.href = 'app.html';
        }
    }
</script>
</body>
</html>
